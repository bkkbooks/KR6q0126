body:
  text: 明白庵居沙門慧洪撰汾陽昭禪師示眾曰先聖云一句語須具三玄一玄中須具三要阿那箇是三玄三要底句快會取好各自思量還得穩當也未古德已前行脚聞一箇因緣未明中間直下飲食無味睡臥不安火急決擇豈將為小事所以大覺老人為一大事因緣出現於世想計他從上來行脚不為游山翫水看州府奢華片衣口食皆為聖心未通所以驅馳行脚決擇深奧傳唱敷揚愽問先知親近高德盖為續佛心燈紹隆佛種祖代興崇聖種接引後機自利利他不忘先迹如今還有商量者麼有即出來大家商量僧問如何是接初機底句答曰汝是行脚僧又問如何是辨衲僧底句答曰西方日出卯又問如何是正令行底句答曰千里持來呈舊面又問如何是立乾坤底句答曰北俱盧州長粳米食者無嗔亦無喜師曰只將此四轉語驗天下衲僧纔見汝出來驗得了也僧問如何是學人著力處答曰嘉州打大像問如何是學人轉身處答曰陝府灌鐵牛問如何是學人親切處答曰西河弄師子師曰若人會此三句已辨三玄更有三要語在切在薦取不是等閑與大眾頌出曰三玄三要事難分得意忘言道易親一句明明該萬象重陽九日菊花新還會麼恁麼會得不是性燥衲僧作麼生會好又舉三玄語曰汝還會三玄底時節麼直須會取古人意旨然後自心明去更得通變自枉受用無窮喚作自受用身佛不從他教便識得自家活計所以南泉曰王老師十八上解作活計僧便問古人十八上解作活計未審作箇什麼活計答曰兩隻水牯牛雙角無棬復云若要於此明得去直須得三玄旨趣始得受用無礙自家慶快以暢平生大丈夫漢莫教自辜觸事不通彼無利濟與汝一切頌出曰第一玄法界廣無邊森羅及萬象總在鏡中圓第二玄釋尊問阿難多聞隨事答應器量方圓第三玄直出古皇前四句百非外閭氏問豐干師乃曰這箇是三玄底頌作麼生是三玄底旨趣直教決擇分明莫只與麼望空裏妄解道我曾親近和尚來與我說了脫空漫語誑嚇他人喫鐵棒有日莫言不道又因採菊謂眾曰金花布地玉蘂承天杲日當空乾坤朗耀雲騰致雨露結為霜不傷物義道將一句來還有道得底麼若道不得眼中有屑直須出却始得所以風穴云若立一塵家國興盛野老顰蹙不立一塵家國喪亡野老安貼於此明去闍梨無分全是老僧於此不明老僧即是闍梨闍梨與老僧亦能悟却天下人亦能瞎却天下人要知老僧與闍梨麼拊其膝曰這裏是闍梨這裏是老僧且問諸上座老僧與闍梨是同是別若道是同去上座自上座老僧自老僧若道是別去又道老僧即是闍梨若能於此明得去一句中有三玄三要賓主歷然平生事辦參尋事畢所以永嘉曰粉骨碎身未足酬一句了然超百億又曰臨濟兩堂首座一日相見齊下喝僧問臨濟還有賓主也無答曰賓主歷然師作偈曰兩堂首座總作家其中道理有分拏賓主歷然明似鏡宗師為點眼中花無盡居士謂予曰汾陽臨濟五世之嫡孫天下學者宗仰觀其提綱渠渠唯論三玄三要今其法派皆以謂三玄三要一期建立之語無益於道但於諸法不生異見一切平常即長祖意其說是否予曰居士聞其說曉然了解寧復疑汾陽提綱乎曰吾固疑而未決也予曰此其三玄三要之所以設也所言一句中具三玄一玄中具三要有玄有要者一切眾生熱惱海中清涼寂滅法幢也此幢之建譬如塗毒之鼓撾之則聞者皆死唯遠聞者後死若不橫死者雖聞不死臨濟無恙時興化三聖保壽定上座輩聞而死者今百餘年猶有悟其旨者即後死者也而諸法派謂無益於道者即不橫死者也祖宗門風壁立萬仞而子孫畏之喜行平易坦塗此所謂法道陵夷也譬如衣冠稱孔門弟子而毀易繫辭三尺童子笑之臨濟但曰一句中具三玄一玄中具三要有玄有要而已初未甞目為句中玄意中玄體中玄也古塔主者悞認玄沙三句為三玄故但分三玄而遺落三要叢林安之不以為非為可太息玄沙曰真常流注為平等法但是以言遣言以理逐理為之明前不明後盖分證法身之量未有出格之句死在句下若知出格之量則不被心魔所使入到手中便轉換落落地言通大道不坐平常之見此第一句也古謂之句中玄回機轉位生殺自在縱奪隨宜出生入死廣利一切逈脫色欲愛見之境此第二句也古謂之意中玄明陰洞陽廓周沙界一真體性大用現前應化無方全用全不用全生全不生方便喚作慈定之門此第三句也古謂之體中玄浮山遠公亦曰意中玄非意識之意古不足道遠亦迷倒予不可以不辨無盡頷之又曰吾頃見謝師直稱吳僧簡程者有大知見親見慈明蓋是真點胸楊岐道吾之流亞接人多舉汾陽十智同真願遂聞其說予曰十智同真與三玄三要同一關捩汾陽曰夫說法者須具十智同真若不具十智同真邪正不辨緇素不分不能與人天為眼目決斷是非如鳥飛空而折翼如箭射的而斷絃絃斷故射的不中翼折故空不可飛弦壯翼牢空的俱徹作麼生是十智同真與諸上座點出一同一質二同大事三總同參四同真智五同徧普六同具足七同得失八同生殺九同音吼十同得入又云與什麼人同得入與誰同音吼作麼生是同生殺什麼物同得失阿郍箇同具足是什麼同徧普何人同真智孰能總同參那箇同大事何物同一質有點得出底麼點得出者不悋慈悲點不出者未有參學眼在切須辦取要識是非面目見在今此法門叢林怕怖不欲聞其若何以言之諸方但愛平實見解執之不移唯欲傳授不信有悟借使汾陽復生親為剖折亦以為非昔阿難夜經行聞童子誦佛偈曰若人生百歲不善水潦鶴未若生一日而得決了之阿難就教之曰不善諸佛機非水潦鶴也童子歸白其師師咲曰阿難老昏矣當以我語為是於今學者之前語三玄十智旨趣何以異此於是無盡嗟咨曰然其旨趣豈無方便予作偈曰十智同真面目全於中一智是根源若大咨見汾陽老擘破三玄作兩邊又問四種賓主亦臨濟建立法門乎予曰三世如來諸代祖師鍛出凡聖情見之鑪鎚非止臨濟用之如龍山本見馬祖洞山价禪師初游方與密師伯者偕行經長沙龍山之下見溪流菜葉价回瞻峯巒深秀謂密曰箇中必有隱者乃並溪而進十許里有老僧癯甚以手加額呼曰此間無路汝輩何自而至价曰無路且置庵主自何而入曰我不曾雲水价曰庵主住山幾許時曰春秋不涉价曰庵主先住耶此山先住耶曰不知价曰為什麼不知曰我不曾人天來价曰得何道理便爾住山曰我見泥牛鬪入海直至而今無消息价即班密之下而之問如何是主中賓曰青山覆白雲又問如何是主中主曰長年不出戶又問主賓相去幾何曰長江水上波又問賓主相見有何言說曰青風拂白日价再拜求依止老僧咲曰三間茆屋從來住一道神光萬境閑莫作是非來辨我浮生穿鑿不相關於是自焚其庵深入層峯其後价住山問僧何者是汝主人公對曰現祇對者价仰而咨嗟曰此所謂馬後驢前事奈何認以為自己乎佛法平沉此其兆也客中主尚未明況主中主哉僧曰如何是主中主价曰汝自道看曰道得即是客中主如何是主中主价良久曰不辭向汝道相續也大難予觀龍山老僧之意如蕭何之識韓信豈有法哉而价公之論如霍光之立朝進止亦有律度嗚呼後生之不見古人之大全也必矣价亦置主中主于𮌎中可疑也予甞至臨川與朱世英游相好俄上藍長老者至上蓋謂世英曰覺範聞工詩耳禪則其師猶錯矧弟子耶世英咲曰師能勘驗之乎上藍曰諾居一日同游疎山飯于逆族上藍以手畫案謂余曰經軸之上必題以字是何義予亦畫圓相橫一畫曰是此義也上藍愕然予為作偈曰以字不成八不是法身睡著無遮閑衲僧對面不知名百眾人前呼不起上藍歸舉似世英世英拊手曰孰為詩僧亦能識字義乎因同看汾陽作犢牛偈曰有頭無角實堪嗟百劫難逃這作家凡聖不能明得盡現前相㒵有些些予謂世英曰此偈又予字義之訓詁也世英問余華嚴經曰毗目仙人執善財手即時善財自見其身住十佛剎微塵數世界中到十佛剎微塵數諸佛所見彼佛剎及其眾會諸佛相好種種莊嚴乃至或經百千億不可說佛剎微塵數劫乃至時彼仙人放善財童子手即時自見其身還在本處此一段義何以明之予曰皆象也方執其手即入觀法之時見自他不隔於毫端始終不移於當念及其放手即是出定之時永明曰是知不動本位遠近之剎歷然一念靡移延促之時宛爾世尊蓋以蓮為譬而世莫有知者予特知之夫蓮方開華時中已有子子中已有藌因中有果果中有因三世一時也其子分布又曾屬焉相續不斷十方不隔也又問法華經曰世尊於一切眾前現大神力出廣長舌相上至梵世極難和會而解者曰佛音深妙觸處皆聞超越聖凡則其舌廣長高出梵世此說如何予曰此殆所謂隨語生解非如來世尊之意溈山曰凡聖情盡體露真常理事不二即如如佛而學者不能深味此語苟認意度而已譬如眾盲摸象隨其所得為是故象偏為尾為蹄為腰為牙而全象隱矣般若經曰無二無二分無別無斷故者真常也非凝然一物卓然不變壞之真常也舌相之至梵世其可以情求哉唐僧玄奘至西竺見戒賢論師賢時已一百六歲眾所宗向號正法藏弉修敬訖賢使坐問從何來對曰從支那國來欲學瑜伽等論於是賢流涕呼弟子覺賢指以謂曰我前所夢何如弟子謂奘曰和尚三年前得疾危甚如人以刀劃其腹欲不食而死夜夢男子身金色曰汝勿自厭其身汝昔作貴近多害物命當自悔責自盡何益有支那國僧來此學法已在塗矣三年當至以法惠彼彼復流通汝罪自滅我曼殊室利也故來曉汝耳和尚疾損已三年而闍梨果至前夢有徵也子涉世多艱蓋其夙障聞曼殊室利之言以法惠人則罪自滅故有撰述佛祖旨訣之意欲以惠人而自滅夙障耳非有他求也
